name: manual-publish

# Manual, one-off publisher for an already-tagged release whose automatic
# publish did not run (or failed). Checks out an explicit tag/ref, asserts
# package.json version + repository.url, then publishes to npm with provenance.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git tag/ref to publish (e.g. 3.0.0)"
        required: true
        default: "3.0.0"
      expected_version:
        description: "Version package.json MUST declare"
        required: true
        default: "3.0.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Enable corepack
        run: corepack enable
      - name: Assert version + repository casing
        run: |
          node -e 'const p=require("./package.json"); if (p.version !== "${{ inputs.expected_version }}") throw new Error("version "+p.version); if (p.repository.url !== "git+https://github.com/SpeechifyInc/speechify-api-sdk-typescript.git") throw new Error("repository.url "+p.repository.url)'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Publish to npm
        run: npm publish --provenance --access public
